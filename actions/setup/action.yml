name: 'Setup Activation'
description: 'Copy activation job files to the agent environment'
author: 'GitHub Next'

inputs:
  destination:
    description: 'Destination directory for activation files (default: ${RUNNER_TEMP}/gh-aw/actions)'
    required: false
  safe-output-custom-tokens:
    description: 'Install @actions/github for handlers that use a per-handler github-token (creates Octokit via getOctokit)'
    required: false
    default: 'false'

outputs:
  files_copied:
    description: 'Number of files copied'

runs:
  using: 'node24'
  main: 'index.js'
  post: 'post.js'
  post-if: 'always()'

branding:
  icon: 'play'
  color: 'blue'
