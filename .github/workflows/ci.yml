            echo "✅ Node cache hit" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Node cache miss" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Install npm dependencies
        run: cd actions/setup/js && npm ci

      - name: Run live GitHub API integration test
        env:
