  - cron: "6 11 * * 1-5"
    # Friendly format: daily around 11:00 on weekdays (scattered)
  workflow_dispatch:
    inputs:
      aw_context:
        default: ""
        description: Agent caller context (used internally by Agentic Workflows).
        required: false
        type: string

permissions: {}

concurrency:
  group: "gh-aw-${{ github.workflow }}"

run-name: "Daily Fact About gh-aw"

env:
